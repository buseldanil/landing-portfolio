<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy — SCity Circus Fest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #090603;
        --panel: rgba(24, 15, 9, 0.88);
        --border: rgba(255, 223, 163, 0.12);
        --gold: #f0cb74;
        --text: #fff7e7;
        --muted: rgba(255, 245, 221, 0.74);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background:
          linear-gradient(180deg, rgba(5, 3, 1, 0.94), rgba(9, 6, 3, 0.96)),
          url('photo1.jpeg') center/cover fixed no-repeat;
        color: var(--text);
        line-height: 1.7;
      }

      .wrap {
        width: min(calc(100% - 32px), 900px);
        margin: 0 auto;
        padding: 60px 0 80px;
      }

      .top-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 22px;
        border-radius: 999px;
        background: linear-gradient(135deg, #f8db8b, #d4a73a);
        color: #1a1209;
        font-weight: 800;
        text-decoration: none;
        margin-bottom: 28px;
      }

      .policy-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 36px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(34px, 7vw, 56px);
        line-height: 1.04;
        font-family: 'Playfair Display', serif;
        font-style: italic;
        color: var(--gold);
      }

      h2 {
        margin: 34px 0 12px;
        font-size: 24px;
        color: var(--gold);
      }

      p,
      li {
        color: var(--muted);
        font-size: 16px;
      }

      ul {
        padding-left: 22px;
      }

      strong {
        color: var(--text);
      }

      .muted-note {
        margin-bottom: 24px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .policy-card {
          padding: 24px;
          border-radius: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a href="index.html" class="top-link">← Back to main page</a>

      <div class="policy-card">
        <h1>Privacy Policy</h1>
        
        </p>
      </div>
    </div>
  </body>
</html>
